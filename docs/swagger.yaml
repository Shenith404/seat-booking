  termsOfService: http://swagger.io/terms/
  title: Seat Booking API
  version: "1.0"
paths:
  /api/v1/bookings:
    post:
      consumes:
      - application/json
      description: Create a booking from held seats
      parameters:
      - description: Create booking request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_booking.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_booking.BookingResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Response'
            - properties:
                error:
                  $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Error'
              type: object
        "409":
          description: Conflict
          schema:
            allOf:
            - $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Response'
            - properties:
                error:
                  $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Error'
              type: object
      summary: Create a booking
      tags:
      - booking
  /api/v1/bookings/{id}:
    get:
      description: Get booking details by ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_booking.BookingResponse'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Response'
            - properties:
                error:
                  $ref: '#/definitions/github_com_shenith404_seat-booking_internal_common.Error'
              type: object
      summary: Get a booking
      tags:
      - booking
  /api/v1/halls:
